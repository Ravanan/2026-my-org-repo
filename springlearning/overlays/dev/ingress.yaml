apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: springlearning-dev-ingress
  namespace: springlearning-dev
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: dev.springlearning.local
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: springlearning-service
                port:
                  number: 80

