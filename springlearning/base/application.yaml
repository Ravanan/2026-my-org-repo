apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: springlearning-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ravanan/2026-my-org-repo.git
    targetRevision: main
    path: springlearning
  destination:
    server: https://kubernetes.default.svc    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
